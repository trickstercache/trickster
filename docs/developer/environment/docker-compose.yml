services:

  # caches

  redis:
    image: redis:7-alpine
    restart: always
    ports:
     - 6379:6379
    volumes:
     - ./docker-compose-data/redis-data:/data
    command: redis-server --appendonly yes --stop-writes-on-bgsave-error no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5

  # ui's

  grafana:
    image: grafana/grafana:11.6.0
    user: nobody
    environment:
      - GF_INSTALL_PLUGINS=vertamedia-clickhouse-datasource
    volumes:
      - ./docker-compose-data/grafana-config:/etc/grafana
      - ./docker-compose-data/dashboards:/var/lib/grafana/dashboards
    build:
      context: .
      network: host
    restart: always
    ports:
     - 3000:3000
    depends_on:
      - influxdb2
      - prometheus

  # TSDBs

  prometheus:
    image: prom/prometheus:v3.11.3
    user: nobody
    volumes:
      - ./docker-compose-data/prometheus-config:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    build:
      context: .
      network: host
    ports:
     - 9090:9090
    restart: always

  # influxdb 2.x
  influxdb2:
    image: influxdb:2.7
    volumes:
      # Mount for influxdb data directory and configuration
      - ./docker-compose-data/influxdb2-config/config.yml:/etc/influxdb2/config.yml
      - influxdbv2:/.influxdbv2
    build:
      context: .
      network: host
    restart: always
    ports:
     - 8086:8086
    command:
      - '--reporting-disabled'

  # influxdb 2.0 cli, for seeding influxdb on startup
  influxdb2_seed:
    links:
      - influxdb2
    image: influxdb:2.7
    volumes:
      - ./docker-compose-data/influxdb2-config/setup-influxdb2.sh:/bin/setup-influxdb2.sh
  # Use these same configurations parameters in your telegraf configuration, mytelegraf.conf.
    entrypoint: sh /bin/setup-influxdb2.sh
    build:
      context: .
      network: host
    restart: on-failure:10
    depends_on:
      # Wait for the influxd service in the influxdb container to start before
      # trying to setup an influxdb instance with the influxdb_cli service. 
      - influxdb2

  # clickhouse
  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    ports:
     - 9000:9000
     - 8123:8123
    build:
      context: .
      network: host
    volumes:
      - ./docker-compose-data/clickhouse-config/users/default-user.xml:/etc/clickhouse-server/users.d/default-user.xml
    restart: always

  # clickouse-client, for seeding clickhouse on startup
  clickhouse_seed:
    links:
      - clickhouse
    image: clickhouse/clickhouse-server:25.3
    volumes:
      - ./docker-compose-data/clickhouse-config/seeding:/seeding
    entrypoint: /seeding/seed.sh
    build:
      context: .
      network: host
    depends_on:
      - clickhouse

  # elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - node.store.allow_mmap=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
     - 9200:9200
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s' >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: always

  # elasticsearch seed data
  elasticsearch_seed:
    links:
      - elasticsearch
    image: curlimages/curl:8.11.1
    environment:
      - ES_URL=http://elasticsearch:9200
    volumes:
      - ./docker-compose-data/elasticsearch-config/seeding:/seeding
    entrypoint: sh /seeding/seed.sh
    restart: on-failure:10
    depends_on:
      - elasticsearch

  # elasticsearch frontend
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.3
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      - ELASTICSEARCH_HOSTS=["http://host.docker.internal:8480/es1"]
      - XPACK_SECURITY_ENABLED=false
      - TELEMETRY_ENABLED=false
      - SERVER_PUBLICBASEURL=http://127.0.0.1:5601
    ports:
     - 5601:5601
    restart: always
    depends_on:
      - elasticsearch

  # kibana saved objects for elasticsearch demo data
  kibana_seed:
    links:
      - kibana
    image: curlimages/curl:8.11.1
    environment:
      - KIBANA_URL=http://kibana:5601
    volumes:
      - ./docker-compose-data/kibana-config/seeding:/seeding
    entrypoint: sh /seeding/seed.sh
    restart: on-failure:10
    depends_on:
      - kibana

  # Mocks

  mockster:
    image: tricksterproxy/mockster:latest
    build:
      context: .
      network: host
    restart: always
    ports:
     - 8482:8482

  # Tracing

  jaeger:
    image: jaegertracing/all-in-one:1.67.0
    ports:
     - 5775:5775/udp
     - 6831:6831/udp
     - 6832:6832/udp
     - 5778:5778
     - 16686:16686
     - 4317:4317
     - 4318:4318
     - 14250:14250
    build:
      context: .
      network: host
    restart: always

  # polling

  telegraf:
    image: telegraf:1.34-alpine
    restart: always
    volumes:
      - ./docker-compose-data/telegraf-config/telegraf.conf:/etc/telegraf/telegraf.conf
    depends_on:
      - influxdb2

volumes:
  elasticsearch-data:
  influxdbv2:
  prometheus-data:
