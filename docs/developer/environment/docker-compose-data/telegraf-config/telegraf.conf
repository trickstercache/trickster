[agent]
  interval="5s"

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

[[inputs.mem]]

[[inputs.netstat]]

[[inputs.system]]

[[inputs.net]]

[[outputs.influxdb_v2]]
  urls = ["http://influxdb2:8086"]
  token = "trickster-dev-token"
  organization = "trickster-dev"
  bucket = "trickster"

[[outputs.influxdb]]
  urls = ["http://influxdb3:8181"]
  database = "trickster"
  skip_database_creation = true
