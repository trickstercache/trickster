frontend:
  listen_port: 8490

metrics:
  listen_port: 8491

mgmt:
  listen_port: 8492

logging:
  log_level: info

negative_caches:
  default:
    "400": 3
    "404": 3
    "500": 3

caches:
  mem1:
    provider: memory
  mem2:
    provider: memory

authenticators:
  alb-ur-users:
    provider: basic
    proxy_preserve: true
    users:
      alice: alicepw
      bob: bobpw

backends:
  prom1:
    provider: prometheus
    origin_url: http://127.0.0.1:9090
    cache_name: mem1
  prom2:
    provider: prometheus
    origin_url: http://127.0.0.1:9090
    cache_name: mem2
  # Backends with prometheus.labels configured to exercise the
  # hasTransformations capture path through ALB (regression test for #937).
  prom1-labeled:
    provider: prometheus
    origin_url: http://127.0.0.1:9090
    cache_name: mem1
    prometheus:
      labels:
        region: us-east
    # Path override injects a custom downstream response header on instant
    # queries. Used by TestALB_HeaderPropagation to verify backend-emitted
    # response headers survive the ALB FGR transform path.
    # regression: #970
    paths:
      - path: /api/v1/query
        handler: query
        methods: [GET, POST]
        match_type: exact
        cache_key_params: [query, time]
        response_headers:
          X-Test-Origin: prom1
  prom2-labeled:
    provider: prometheus
    origin_url: http://127.0.0.1:9090
    cache_name: mem2
    prometheus:
      labels:
        region: us-west
    # Both labeled members advertise X-Test-Origin so the fanout winner is
    # irrelevant to TestALB_HeaderPropagation; either pool member proves
    # backend-emitted response headers survive the ALB transform path.
    # regression: #970
    paths:
      - path: /api/v1/query
        handler: query
        methods: [GET, POST]
        match_type: exact
        cache_key_params: [query, time]
        response_headers:
          X-Test-Origin: prom1
  alb-fgr:
    provider: alb
    alb:
      mechanism: fgr
      pool:
        - prom1
        - prom2
  alb-rr:
    provider: alb
    alb:
      mechanism: rr
      pool:
        - prom1
        - prom2
        - prom1
  alb-tsm:
    provider: alb
    alb:
      mechanism: tsm
      pool:
        - prom1
        - prom2
  alb-nlm:
    provider: alb
    alb:
      mechanism: nlm
      pool:
        - prom1
        - prom2
  # Labeled-pool ALBs that exercise the prometheus capture/transform path
  # (regression test for #937). Each pool member injects a different region
  # label so the test can also verify InjectTags is applied.
  alb-fgr-labeled:
    provider: alb
    alb:
      mechanism: fgr
      pool:
        - prom1-labeled
        - prom2-labeled
  alb-nlm-labeled:
    provider: alb
    alb:
      mechanism: nlm
      pool:
        - prom1-labeled
        - prom2-labeled
  alb-tsm-labeled:
    provider: alb
    alb:
      mechanism: tsm
      pool:
        - prom1-labeled
        - prom2-labeled
  # A Prometheus-shaped origin that serves `Content-Encoding: deflate`
  # bodies via a test httptest.Server bound to a reserved port.
  # regression: #938
  prom-deflate:
    provider: prometheus
    origin_url: http://127.0.0.1:18500
    cache_name: mem1
  # TSM over a deflate-encoded origin + a gzip-capable origin. Used by
  # TestALB_TSM_DeflateOrigin to verify the merge path can decode
  # non-gzip compressed upstream responses.
  # regression: #938
  alb-tsm-deflate:
    provider: alb
    alb:
      mechanism: tsm
      pool:
        - prom-deflate
        - prom1
  # FR mechanism: fanout + first response wins (no status-code gating).
  alb-fr:
    provider: alb
    alb:
      mechanism: fr
      pool:
        - prom1
        - prom2
  # UR mechanism: routes requests by observed basic-auth username.
  # alice -> prom1-labeled (region=us-east)
  # bob   -> prom2-labeled (region=us-west)
  alb-ur:
    provider: alb
    authenticator_name: alb-ur-users
    alb:
      mechanism: ur
      user_router:
        default_backend: prom1-labeled
        users:
          alice:
            to_backend: prom1-labeled
          bob:
            to_backend: prom2-labeled
