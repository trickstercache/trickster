# Minimal config used by TestEngines_* integration tests. Points at a fake
# httptest.Server on 127.0.0.1:18520 started by each test.

listeners:
  default:
    port: 8520
  metrics:
    port: 8521
  mgmt:
    port: 8522

logging:
  log_level: error

negative_caches:
  default:
    "400": 3
    "500": 3

caches:
  mem1:
    provider: memory

backends:
  prom-fake:
    provider: prometheus
    origin_url: http://127.0.0.1:18520
    cache_name: mem1
