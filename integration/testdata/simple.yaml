frontend:
  listen_port: 8500

metrics:
  listen_port: 8501

mgmt:
  listen_port: 8502

logging:
  log_level: info

caches:
  mem1:
    provider: memory

negative_caches:
  default:
    "400": 3
    "404": 3
    "500": 3

backends:
  rpc1:
    provider: proxy
    origin_url: http://127.0.0.1:59999
    cache_name: mem1
    negative_cache_name: default
